name: Buscador de Preços (Self-hosted)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-scraper-selfhosted:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate local Python
        shell: cmd
        run: |
          where py
          if %ERRORLEVEL% EQU 0 (
            py -3.11 --version
          ) else (
            python --version
          )

      - name: Install dependencies
        shell: cmd
        run: |
          where py
          if %ERRORLEVEL% EQU 0 (
            py -3.11 -m pip install --upgrade pip
            py -3.11 -m pip install -r requirements.txt
          ) else (
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          )

      - name: Install Playwright Chromium
        shell: cmd
        run: |
          where py
          if %ERRORLEVEL% EQU 0 (
            py -3.11 -m playwright install chromium
          ) else (
            python -m playwright install chromium
          )

      - name: Run scraper
        shell: cmd
        env:
          SEARCH_KEYWORD: "Monitor"
          TOP_N_RESULTS: "5"
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_SHEET_NAME: "Historico"
          TARGET_SHEET_NAME: "PrecosAlvo"
          LOG_LEVEL: "INFO"
          PLAYWRIGHT_HEADLESS: "true"
          SCRAPER_PROXY_SERVER: ${{ secrets.SCRAPER_PROXY_SERVER }}
          SCRAPER_PROXY_USERNAME: ${{ secrets.SCRAPER_PROXY_USERNAME }}
          SCRAPER_PROXY_PASSWORD: ${{ secrets.SCRAPER_PROXY_PASSWORD }}
        run: |
          where py
          if %ERRORLEVEL% EQU 0 (
            py -3.11 main.py
          ) else (
            python main.py
          )
