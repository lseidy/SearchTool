name: Buscador de Preços (Self-hosted)

on:
  schedule:
    # GitHub Actions usa UTC.
    # Horários abaixo equivalem a BRT (UTC-3):
    # 06:00, 07:30, 09:00, 10:30, 12:00, 13:30, 15:00, 16:30,
    # 18:00, 19:30, 21:00, 22:30, 00:00 e 00:30.
    - cron: "0 9,12,15,18,21 * * *"
    - cron: "30 10,13,16,19,22 * * *"
    - cron: "0 0,3 * * *"
    - cron: "30 1,3 * * *"
  workflow_dispatch:

jobs:
  run-scraper-selfhosted:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          SEARCH_KEYWORDS: "Nintendo Switch 2|Bicicleta Aro 24|Jogo de Panelas Inox Tramontina"
          TOP_N_RESULTS: "5"
          CALIBRATION_TOP_N: "50"
          MONITOR_TOP_N: "5"
          MIN_PRICE_THRESHOLD: "0"
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_SHEET_NAME: "Historico"
          TARGET_SHEET_NAME: "PrecosAlvo"
          ML_ITEM_CONDITION: "2230284"
          ML_SHIPPING_ORIGIN: "10215068"
          ML_NO_INDEX: "true"
          LOG_LEVEL: "INFO"
          PLAYWRIGHT_HEADLESS: "true"
          SCRAPER_PROXY_SERVER: ${{ secrets.SCRAPER_PROXY_SERVER }}
          SCRAPER_PROXY_USERNAME: ${{ secrets.SCRAPER_PROXY_USERNAME }}
          SCRAPER_PROXY_PASSWORD: ${{ secrets.SCRAPER_PROXY_PASSWORD }}
        run: python main.py
